      - name: "index"
        type: "string"
        description: "索引名称"
        required: true
      - name: "timestamp"
        type: "string"
        description: "目标日志的时间戳（ISO8601）"
        required: true
      - name: "doc_id"
        type: "string"
        description: "目标日志的文档 ID（可选）"
        required: false
      - name: "before_count"
        type: "integer"
        description: "向前获取的条数（默认 5）"
        required: false
      - name: "after_count"
        type: "integer"
        description: "向后获取的条数（默认 5）"
        required: false
      - name: "datasource"
        type: "string"
        description: "数据源名称（可选）"
        required: false

  - name: "foundation.elasticsearch.query-field-stats"
    description: "获取索引的字段列表、类型和值分布，帮助构建查询条件。keyword/boolean 字段返回 Top N，数值字段返回 min/max/avg"
    args:
      - name: "index"
        type: "string"
        description: "索引名称或模式"
        required: true
      - name: "fields"
        type: "array"
        description: "指定要统计的字段（可选）"
        required: false
      - name: "datasource"
        type: "string"
        description: "数据源名称（可选）"
        required: false

  - name: "foundation.elasticsearch.scroll-logs"
    description: "基于 search_after 的深度翻页，突破 from+size 的 10000 条限制。首次不传 search_after，后续传入上一页返回的 next_search_after 值"
    args:
      - name: "index"
        type: "string"
        description: "索引名称或模式"
        required: true
      - name: "search_after"
        type: "array"
        description: "上一页返回的 next_search_after 值（首次不传）"
        required: false
      - name: "keyword"
        type: "string"
        description: "搜索关键词（可选）"
        required: false
      - name: "size"
        type: "integer"
        description: "每页条数（默认 20，最大 200）"
        required: false
      - name: "compact"
        type: "boolean"
        description: "紧凑模式（默认 false）"
        required: false
      - name: "datasource"
        type: "string"
        description: "数据源名称（可选）"
        required: false

