
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-mcp
  namespace: <your-namespace>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-mcp
  template:
    metadata:
      labels:
        app: elasticsearch-mcp
    spec:
      imagePullSecrets:
      - name: harbor-REDACTED_SECRET
      volumes:
      - name: config-volume
        configMap:
          name: elasticsearch-mcp-config
      containers:
      - name: elasticsearch-mcp
        image: <your-registry>/infra/elasticsearch-mcp:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: TZ
          value: "Asia/Shanghai"
        - name: MCP_PORT
          value: "8080"
        volumeMounts:
        - name: config-volume
          mountPath: /app/etc
          readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
